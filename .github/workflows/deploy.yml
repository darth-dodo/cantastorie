# Deploy the static player to GitHub Pages on every push to main.
# The player is fully static: compile Tailwind, publish static/ as-is.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; don't cancel a production deploy mid-flight
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Player
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile Tailwind CSS
        run: npx @tailwindcss/cli -i ./static/css/input.css -o ./static/css/output.css --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: static

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
