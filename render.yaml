# =============================================================================
# Render Blueprint for the Cantastorie FastAPI Application
# =============================================================================
# Documentation: https://render.com/docs/blueprint-spec
#
# Deployment Instructions:
# 1. Connect the GitHub repository to Render.com
# 2. Create a new "Blueprint" and point to this render.yaml
# 3. Deploy — the app needs no secrets; pipeline keys stay local
#
# Runs the Dockerfile, whose first stage compiles the Tailwind stylesheet.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Primary Web Service - FastAPI Application (player page + parent area)
  # ---------------------------------------------------------------------------
  - type: web
    name: cantastorie
    runtime: docker
    # Always-on: no cold-start spin-down. The app is opened fresh at bedtime
    # daily, so on the free tier's 15-min idle every first open would be a
    # ~50s cold boot — blowing the 4s budget (docs/architecture.md risk log).
    plan: starter
    region: frankfurt
    branch: main

    # Auto-deploy on push to main branch
    autoDeploy: true

    # Health Check Configuration
    healthCheckPath: /health

    envVars:
      # Where the player fetches published stories. Point this at the R2
      # public bucket URL, including the /published prefix, e.g.
      # https://pub-<hash>.r2.dev/published — set in the Render dashboard.
      # Left unset, the player falls back to the app's /static/content mount.
      - key: ASSET_BASE
        sync: false

      # Pipeline checkpoint cache — must be writable. /tmp is writable on
      # Render's Docker containers; /app is read-only.
      - key: CONTENT_DIR
        value: /tmp/cantastorie-content

      # The web app serves static shells only; no API keys required.
      # OPENROUTER_API_KEY / ELEVENLABS_API_KEY belong to the local pipeline
      # environment and are added here only when Phase 2 factory routes land.
      - key: PYTHON_VERSION
        value: "3.12"
